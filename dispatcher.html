<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatcher Confirmation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="tutorial.css">
    <style>
        .day-card {
            transition: all 0.2s ease-in-out;
        }
        .day-card.status-override {
            border-color: #f59e0b; /* Amber-500 */
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }
        .day-card.status-confirmed {
            border-color: #22c55e; /* Green-500 */
        }
        .driver-list-item.active {
            background-color: #3b82f6; /* blue-500 */
            color: #fff;
        }
    </style>
</head>
<body class="text-slate-300">

    <div id="loading-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center">
        <h1 class="text-5xl font-extrabold text-white">Dispatcher Portal</h1>
        <div id="progress-bar-container" class="w-80 h-2 bg-slate-800/50 rounded-full overflow-hidden mt-6 shadow-lg">
            <div id="progress-bar" class="w-0 h-full bg-blue-500 rounded-full transition-all duration-500 ease-out"></div>
        </div>
        <p id="loading-text" class="mt-4 text-sm text-slate-400">Initializing...</p>
    </div>
    
    <main class="p-4 sm:p-6 lg:p-8 max-w-screen-2xl mx-auto hidden" id="main-content">
        <header class="flex flex-wrap justify-between items-center mb-6 pb-4 border-b border-slate-700">
            <h1 class="text-3xl font-bold text-white">Driver Activity Confirmation</h1>
            <div class="flex items-center gap-4 mt-4 sm:mt-0">
                <button id="start-tutorial-btn" class="text-sm font-semibold text-blue-400 hover:text-blue-300">Start Tutorial</button>
                <p class="text-sm text-slate-400">Powered by Spotter.ai</p>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-12 lg:col-span-3">
                <div class="bg-slate-900 p-4 rounded-xl border-2 border-black/20 shadow-2xl shadow-black/40 space-y-6">
                    <div>
                         <div class="mb-4">
                            <label for="pay-date-select" class="block text-sm font-medium text-slate-400 mb-2">1. Pay Week</label>
                            <div class="relative rounded-lg shadow-lg shadow-black/20">
                                <select id="pay-date-select" class="w-full appearance-none py-2 pl-4 pr-10 border border-slate-700 bg-slate-800 text-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" disabled>
                                    <option>Loading pay dates...</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-400">
                                    <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label for="dispatcher-driver-search" class="block text-sm font-medium text-slate-400 mb-2">2. Find Dispatcher or Driver</label>
                            <input type="text" id="dispatcher-driver-search" placeholder="Enter dispatcher or driver name..." class="w-full pl-4 pr-4 py-2 border border-slate-700 bg-slate-800 text-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm shadow-lg shadow-black/20">
                        </div>
                    </div>

                    <hr class="border-slate-700">

                    <div>
                        <h3 class="text-lg font-semibold text-slate-200 mb-3">Driver List</h3>
                        <div id="driver-list-container" class="space-y-2 max-h-[50vh] overflow-y-auto pr-2">
                            <p class="text-center text-sm text-slate-500 py-4">Enter a name to see drivers.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-9">
                 <div id="activity-confirmation-area" class="h-full flex items-center justify-center">
                    <p class="text-slate-500">Select a driver from the list to begin confirmation.</p>
                 </div>

                 <footer id="save-footer" class="hidden mt-6 pt-4 border-t border-slate-700 flex justify-end items-center gap-4">
                    <div id="verified-message" class="hidden flex items-center gap-2 text-green-400 font-semibold">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
                        <span>Week Verified</span>
                    </div>
                    <button id="cancel-btn" class="hidden bg-slate-500 text-white font-bold py-2 px-6 rounded-lg hover:bg-slate-400 transition-colors shadow-md">Cancel</button>
                    <button id="edit-btn" class="hidden bg-slate-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-slate-500 transition-colors shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-slate-500">
                        Edit
                    </button>
                    <button id="action-btn" class="text-white font-bold py-2 px-6 rounded-lg transition-colors shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900">
                        Confirm as Correct
                    </button>
                </footer>
            </div>
        </div>
    </main>

    <div id="tutorial-overlay" class="hidden"></div>
    <div id="tutorial-box" class="hidden">
        <h3 id="tutorial-title" class="text-lg font-bold text-white mb-2"></h3>
        <p id="tutorial-text" class="text-sm mb-4"></p>
        <div class="flex justify-between items-center">
            <button id="tutorial-end" class="text-xs text-slate-400 hover:text-white">End Tutorial</button>
            <div>
                <button id="tutorial-prev" class="text-sm font-semibold py-1 px-3 rounded-md bg-slate-600 hover:bg-slate-500 disabled:opacity-50 disabled:cursor-not-allowed">&larr; Previous</button>
                <button id="tutorial-next" class="text-sm font-semibold py-1 px-3 rounded-md bg-blue-600 hover:bg-blue-500">Next &rarr;</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50"></div>

    <script type="module" src="js/dispatcher.js"></script>
</body>
</html>
